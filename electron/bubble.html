<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 320px;
        height: 600px;
        background: transparent;
        overflow: hidden;
      }
      .root {
        width: 320px;
        height: 600px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        flex-direction: column;
        background: transparent;
        position: relative;
        -webkit-app-region: drag;
      }
      .btn {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: transparent;
        border: none;
        cursor: grab;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        -webkit-app-region: no-drag;
        outline: none;
        animation: breathe 3s ease-in-out infinite;
        transition: opacity 0.3s;
        user-select: none;
        margin-bottom: 18px;
      }
      .btn.dragging {
        cursor: grabbing;
        animation: none;
      }
      .btn.open {
        animation: breathe-fast 1s ease-in-out infinite;
      }
      .btn.open.dragging {
        animation: none;
      }
      .icon {
        width: 34px;
        height: 34px;
        pointer-events: none;
        user-select: none;
      }
      .ring {
        position: absolute;
        border-radius: 50%;
        border: 1.5px solid rgba(201, 168, 124, 0.3);
        pointer-events: none;
      }
      .ring-1 {
        inset: -6px;
        animation: ring-pulse 3s ease-in-out infinite;
      }
      .ring-2 {
        inset: -12px;
        animation: ring-pulse 3s ease-in-out infinite 0.4s;
      }
      .btn.open .ring-1 {
        animation: ring-pulse 1s ease-in-out infinite;
      }
      .btn.open .ring-2 {
        animation: ring-pulse 1s ease-in-out infinite 0.4s;
      }
      .btn.dragging .ring-1,
      .btn.dragging .ring-2 {
        opacity: 0;
      }
      .speaking-dot {
        position: absolute;
        top: -2px;
        right: -2px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #c9a87c;
        border: 2px solid #08070e;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 7px;
        color: #08070e;
        font-weight: 900;
        line-height: 1;
        pointer-events: none;
        z-index: 10;
        animation: speaking-pulse 1s ease-in-out infinite;
      }
      .speaking-dot.visible {
        display: flex;
      }
      @keyframes speaking-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.25); opacity: 0.7; }
      }
      .speech-bubble {
        position: absolute;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%);
        width: 290px;
        max-height: 500px;
        overflow: hidden;
        background: #0e0c17;
        border: 1px solid rgba(201, 168, 124, 0.35);
        border-radius: 10px;
        padding: 8px 10px;
        color: #c9a87c;
        font-family: 'Space Mono', 'Courier New', monospace;
        font-size: 13px;
        line-height: 1.5;
        letter-spacing: 0.01em;
        word-break: break-word;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s ease;
        z-index: 20;
      }
      .speech-bubble.visible {
        opacity: 1;
      }
      .speech-bubble::after {
        content: '';
        position: absolute;
        bottom: -7px;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 7px solid transparent;
        border-right: 7px solid transparent;
        border-top: 7px solid rgba(201, 168, 124, 0.35);
      }
      .speech-bubble::before {
        content: '';
        position: absolute;
        bottom: -6px;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
        border-top: 6px solid #0e0c17;
        z-index: 1;
      }
      /* Speaking / lip-sync state — overrides idle + open animations */
      .btn.speaking {
        border-color: rgba(201, 168, 124, 0.9);
        animation: lip-sync 0.5s ease-in-out infinite !important;
      }
      .btn.speaking.dragging {
        animation: none !important;
      }
      .btn.speaking .ring-1 {
        animation: lip-sync-ring 0.4s ease-in-out infinite !important;
        border-color: rgba(201, 168, 124, 0.55);
      }
      .btn.speaking .ring-2 {
        animation: lip-sync-ring 0.4s ease-in-out infinite 0.2s !important;
        border-color: rgba(201, 168, 124, 0.35);
      }
      @keyframes lip-sync {
        0%   { transform: scale(1);    }
        25%  { transform: scale(1.13); }
        50%  { transform: scale(0.97); }
        75%  { transform: scale(1.10); }
        100% { transform: scale(1);    }
      }
      @keyframes lip-sync-ring {
        0%, 100% { opacity: 0.2; transform: scale(1);    }
        50%       { opacity: 0.8; transform: scale(1.12); }
      }
      @keyframes breathe {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.06);
        }
      }
      @keyframes breathe-fast {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.09);
        }
      }
      @keyframes ring-pulse {
        0%,
        100% {
          opacity: 0.3;
          transform: scale(1);
        }
        50% {
          opacity: 0.6;
          transform: scale(1.05);
        }
      }
    </style>
  </head>
  <body>
    <div class="root">
      <div class="speech-bubble" id="speech-bubble"></div>
      <button class="btn" id="btn">
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
          <!-- Dark background fill so hexagon is opaque against any desktop -->
          <polygon points="60,14 97,35 97,79 60,100 23,79 23,35" fill="#08070e"/>
          <polygon points="60,22 91,39.5 91,74.5 60,92 29,74.5 29,39.5"
            fill="rgba(201,168,124,0.07)">
            <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"
              calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
          </polygon>
          <polygon points="60,14 97,35 97,79 60,100 23,79 23,35"
            fill="none" stroke="#c9a87c" stroke-width="2.5"
            stroke-linejoin="round">
            <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"
              calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
          </polygon>
          <circle cx="97" cy="35" r="3" fill="#c9a87c">
            <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"
              calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
          </circle>

          <!-- Eye blink animations — both eyes blink in sync via shared SMIL begin chains -->
          <!-- Sequence: blink1 at 4s → blink2 at 8.5s after blink1 ends → double-blink3a at 5s after blink2 → double-blink3b 0.35s after 3a -->
          <!-- Left eye -->
          <ellipse id="eye-l" cx="33" cy="57" rx="3" ry="3" fill="#c9a87c">
            <!-- blink 1 -->
            <animate id="lb1" attributeName="ry" values="3;0;3" dur="0.25s" begin="4s" fill="freeze"/>
            <!-- blink 2 (8.5s after blink1 ends) -->
            <animate id="lb2" attributeName="ry" values="3;0;3" dur="0.25s" begin="lb1.end+8.5s" fill="freeze"/>
            <!-- double-blink 3a (5s after blink2 ends) -->
            <animate id="lb3a" attributeName="ry" values="3;0;3" dur="0.2s" begin="lb2.end+5s" fill="freeze"/>
            <!-- double-blink 3b (0.35s after 3a ends) -->
            <animate id="lb3b" attributeName="ry" values="3;0;3" dur="0.2s" begin="lb3a.end+0.35s" fill="freeze"/>
            <!-- restart cycle: blink 4 loops back (9s after double-blink ends) -->
            <animate id="lb4" attributeName="ry" values="3;0;3" dur="0.25s" begin="lb3b.end+9s" fill="freeze"/>
            <animate attributeName="ry" values="3;0;3" dur="0.25s" begin="lb4.end+6s;lb4.end+6s" fill="freeze" repeatCount="indefinite"/>
          </ellipse>
          <!-- Right eye (identical timing, references same lb* ids so they're perfectly synced) -->
          <ellipse id="eye-r" cx="87" cy="57" rx="3" ry="3" fill="#c9a87c">
            <animate attributeName="ry" values="3;0;3" dur="0.25s" begin="lb1.begin" fill="freeze"/>
            <animate attributeName="ry" values="3;0;3" dur="0.25s" begin="lb2.begin" fill="freeze"/>
            <animate attributeName="ry" values="3;0;3" dur="0.2s"  begin="lb3a.begin" fill="freeze"/>
            <animate attributeName="ry" values="3;0;3" dur="0.2s"  begin="lb3b.begin" fill="freeze"/>
            <animate attributeName="ry" values="3;0;3" dur="0.25s" begin="lb4.begin" fill="freeze"/>
            <animate attributeName="ry" values="3;0;3" dur="0.25s" begin="lb4.end+6s" fill="freeze" repeatCount="indefinite"/>
          </ellipse>

          <text x="60" y="65" text-anchor="middle"
            font-family="'Space Mono','Courier New',monospace" font-weight="700" font-size="20"
            fill="#c9a87c" letter-spacing="1">
            B&gt;
          </text>
          <rect x="74" y="51" width="2" height="14" fill="#c9a87c">
            <animate attributeName="opacity" values="1;1;0;0;1;1" dur="1.4s" repeatCount="indefinite"
              keyTimes="0;0.4;0.5;0.9;1;1"/>
          </rect>
        </svg>
        <span class="ring ring-1"></span>
        <span class="ring ring-2"></span>
        <span class="speaking-dot" id="speaking-dot">&#9689;</span>
      </button>
    </div>
    <script>
      const btn = document.getElementById('btn');
      let dragStart = null;
      let isDragging = false;

      function updatePassthrough(clientX, clientY) {
        var el = document.elementFromPoint(clientX, clientY);
        var isOverBtn = el === btn || btn.contains(el);
        window.bubbleAPI?.setIgnoreMouseEvents(!isOverBtn);
      }

      btn.addEventListener('mousedown', e => {
        dragStart = { x: e.screenX, y: e.screenY };
        isDragging = false;
        // Ensure the window is interactive while button is held
        window.bubbleAPI?.setIgnoreMouseEvents(false);
        e.preventDefault();
      });

      window.addEventListener('mousemove', e => {
        if (!dragStart) {
          // Not dragging: make transparent areas pass clicks through to the OS
          updatePassthrough(e.clientX, e.clientY);
          return;
        }
        const dx = e.screenX - dragStart.x;
        const dy = e.screenY - dragStart.y;
        if (!isDragging && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
          isDragging = true;
          btn.classList.add('dragging');
        }
        if (isDragging) {
          window.bubbleAPI?.moveDelta(dx, dy);
          dragStart.x = e.screenX;
          dragStart.y = e.screenY;
        }
      });

      window.addEventListener('mouseup', e => {
        if (dragStart && !isDragging) {
          window.bubbleAPI?.toggle();
        }
        dragStart = null;
        isDragging = false;
        btn.classList.remove('dragging');
        // Re-evaluate passthrough after drag ends
        updatePassthrough(e.clientX, e.clientY);
      });

      // Mouse left the window entirely — restore passthrough
      window.addEventListener('mouseleave', () => {
        if (!dragStart) window.bubbleAPI?.setIgnoreMouseEvents(true);
      });

      const speakingDot = document.getElementById('speaking-dot');
      const speechBubble = document.getElementById('speech-bubble');
      let companionOpen = false;
      let isSpeaking = false;
      let speakingText = '';
      let lastSpeakingText = '';
      let speakingStartedAt = 0;
      let hideTimer = null;
      let chunkTimers = [];

      // Idle companion voice — plays a random line after N minutes of silence
      var IDLE_DELAY_MS = 3 * 60 * 1000; // 3 minutes
      var idleLines = [
        './audio/idle/still-here.mp3',
        './audio/idle/you-good.mp3',
        './audio/idle/whenever-ready.mp3',
        './audio/idle/not-going-anywhere.mp3',
        './audio/idle/still-with-you.mp3',
        './audio/idle/take-your-time.mp3',
      ];
      var idleTimer = null;
      var idleAudio = null;

      function resetIdleTimer() {
        if (idleTimer) clearTimeout(idleTimer);
        idleTimer = setTimeout(playIdleLine, IDLE_DELAY_MS);
      }

      function playIdleLine() {
        if (companionOpen || isSpeaking) { resetIdleTimer(); return; }
        var src = idleLines[Math.floor(Math.random() * idleLines.length)];
        idleAudio = new Audio(src);
        idleAudio.volume = 0.85;
        idleAudio.play().catch(function() {});
        idleAudio.onended = function() { idleAudio = null; resetIdleTimer(); };
      }

      resetIdleTimer();

      var WPM = 160;

      function splitChunks(text) {
        var maxWords = 12;
        var sentences = text.match(/[^.!?]+[.!?]*/g) || [text];
        var chunks = [];
        for (var i = 0; i < sentences.length; i++) {
          var s = sentences[i].trim();
          if (!s) continue;
          var words = s.split(/\s+/).filter(function(w) { return w.length > 0; });
          if (words.length <= maxWords) {
            chunks.push(s);
          } else {
            for (var j = 0; j < words.length; j += maxWords) {
              var chunk = words.slice(j, j + maxWords).join(' ');
              if (chunk) chunks.push(chunk);
            }
          }
        }
        return chunks.filter(function(c) { return c.length > 0; });
      }

      function estimatedDelay(chunk) {
        var words = chunk.trim().split(/\s+/).filter(function(w) { return w.length > 0; }).length;
        var speakMs = (words / WPM) * 60 * 1000;
        // Add pause if chunk ends a sentence
        var pause = /[.!?]\s*$/.test(chunk) ? 500 : 0;
        return Math.max(1000, speakMs + pause);
      }

      function clearChunkTimers() {
        for (var i = 0; i < chunkTimers.length; i++) clearTimeout(chunkTimers[i]);
        chunkTimers = [];
      }

      function setChunk(text) {
        if (speechBubble.classList.contains('visible')) {
          speechBubble.classList.remove('visible');
          var t = setTimeout(function() {
            speechBubble.textContent = text;
            speechBubble.classList.add('visible');
          }, 150);
          chunkTimers.push(t);
        } else {
          speechBubble.textContent = text;
          speechBubble.classList.add('visible');
        }
      }

      function showBubble(rawText) {
        if (!rawText) return;
        if (hideTimer !== null) { clearTimeout(hideTimer); hideTimer = null; }
        clearChunkTimers();
        speakingDot.classList.add('visible');

        // How far into the current audio are we?
        var elapsed = speakingStartedAt > 0 ? Math.max(0, Date.now() - speakingStartedAt) : 0;

        // Real ElevenLabs word-timed path: seek to the chunk that matches elapsed time
        if (rawText.indexOf('__timed:') === 0) {
          try {
            var timed = JSON.parse(rawText.slice(8));
            if (timed && timed.length > 0) {
              // Find the last chunk whose scheduled delay has already passed
              var currentIdx = 0;
              for (var i = 0; i < timed.length; i++) {
                if (timed[i].d <= elapsed) { currentIdx = i; } else { break; }
              }
              setChunk(timed[currentIdx].t);
              for (var i = currentIdx + 1; i < timed.length; i++) {
                (function(entry) {
                  var t = setTimeout(function() { setChunk(entry.t); }, Math.max(0, entry.d - elapsed));
                  chunkTimers.push(t);
                })(timed[i]);
              }
              return;
            }
          } catch(e) {}
        }

        // Estimation fallback (prod companion sends plain text): seek to the right chunk
        var chunks = splitChunks(rawText);
        if (chunks.length === 0) return;
        var cumElapsed = 0;
        var startIdx = 0;
        var chunkStart = 0;
        for (var i = 0; i < chunks.length; i++) {
          var dur = estimatedDelay(chunks[i]);
          if (cumElapsed + dur > elapsed || i === chunks.length - 1) {
            startIdx = i;
            chunkStart = cumElapsed;
            break;
          }
          cumElapsed += dur;
        }
        setChunk(chunks[startIdx]);
        var timeInChunk = elapsed - chunkStart;
        var nextDelay = Math.max(100, estimatedDelay(chunks[startIdx]) - timeInChunk);
        for (var i = startIdx + 1; i < chunks.length; i++) {
          (function(chunk, delay) {
            var t = setTimeout(function() { setChunk(chunk); }, delay);
            chunkTimers.push(t);
          })(chunks[i], nextDelay);
          nextDelay += estimatedDelay(chunks[i]);
        }
      }

      function hideBubble() {
        clearChunkTimers();
        speakingDot.classList.remove('visible');
        speechBubble.classList.remove('visible');
        speechBubble.textContent = '';
        hideTimer = null;
        lastSpeakingText = '';
      }

      window.bubbleAPI?.onStateChange(state => {
        const isOpen = state === 'open';
        btn.classList.toggle('open', isOpen);
        companionOpen = isOpen;
        if (isOpen) {
          // Companion opened — hide any bubble text so it doesn't overlap
          hideBubble();
          if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
        } else {
          resetIdleTimer();
          // Companion closed/minimized — show bubble if there is any speaking text.
          // Use lastSpeakingText as fallback so a race between audio.onended and
          // the hide event (where isSpeaking flips to false a frame too early)
          // doesn't silently drop the bubble.
          var textToShow = speakingText || lastSpeakingText;
          if (textToShow) showBubble(textToShow);
        }
      });

      window.bubbleAPI?.onSpeaking((speaking, text) => {
        isSpeaking = speaking;
        btn.classList.toggle('speaking', speaking);
        speakingText = text || '';
        if (speaking) {
          if (speakingText) lastSpeakingText = speakingText;
          speakingStartedAt = Date.now();
          if (hideTimer !== null) {
            clearTimeout(hideTimer);
            hideTimer = null;
          }
          if (!companionOpen) {
            showBubble(speakingText);
          }
        } else {
          // speaking=false: wait 1000ms before hiding to prevent end-of-speech flicker
          if (hideTimer !== null) clearTimeout(hideTimer);
          hideTimer = setTimeout(() => {
            if (!isSpeaking) hideBubble();
          }, 1000);
          // Reset idle timer — user just had an interaction
          resetIdleTimer();
        }
      });
    </script>
  </body>
</html>
