<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 320px;
        height: 420px;
        background: transparent;
        overflow: hidden;
      }
      .root {
        width: 320px;
        height: 420px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        flex-direction: column;
        background: transparent;
        position: relative;
        -webkit-app-region: drag;
      }
      .btn {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: #08070e;
        border: 1.5px solid rgba(201, 168, 124, 0.35);
        cursor: grab;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        -webkit-app-region: no-drag;
        outline: none;
        animation: breathe 3s ease-in-out infinite;
        transition:
          background 0.3s,
          border-color 0.3s;
        user-select: none;
        margin-bottom: 18px;
      }
      .btn.dragging {
        cursor: grabbing;
        animation: none;
      }
      .btn.open {
        background: #08070e;
        border-color: rgba(201, 168, 124, 0.7);
        animation: breathe-fast 1s ease-in-out infinite;
      }
      .btn.open.dragging {
        animation: none;
      }
      .icon {
        width: 34px;
        height: 34px;
        pointer-events: none;
        user-select: none;
      }
      .ring {
        position: absolute;
        border-radius: 50%;
        border: 1.5px solid rgba(201, 168, 124, 0.3);
        pointer-events: none;
      }
      .ring-1 {
        inset: -6px;
        animation: ring-pulse 3s ease-in-out infinite;
      }
      .ring-2 {
        inset: -12px;
        animation: ring-pulse 3s ease-in-out infinite 0.4s;
      }
      .btn.open .ring-1 {
        animation: ring-pulse 1s ease-in-out infinite;
      }
      .btn.open .ring-2 {
        animation: ring-pulse 1s ease-in-out infinite 0.4s;
      }
      .btn.dragging .ring-1,
      .btn.dragging .ring-2 {
        opacity: 0;
      }
      .speaking-dot {
        position: absolute;
        top: -2px;
        right: -2px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #c9a87c;
        border: 2px solid #08070e;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 7px;
        color: #08070e;
        font-weight: 900;
        line-height: 1;
        pointer-events: none;
        z-index: 10;
        animation: speaking-pulse 1s ease-in-out infinite;
      }
      .speaking-dot.visible {
        display: flex;
      }
      @keyframes speaking-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.25); opacity: 0.7; }
      }
      .speech-bubble {
        position: absolute;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%);
        width: 290px;
        max-height: 400px;
        overflow: hidden;
        background: #0e0c17;
        border: 1px solid rgba(201, 168, 124, 0.35);
        border-radius: 10px;
        padding: 8px 10px;
        color: #c9a87c;
        font-family: 'Space Mono', 'Courier New', monospace;
        font-size: 11px;
        line-height: 1.5;
        letter-spacing: 0.01em;
        word-break: break-word;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s ease;
        z-index: 20;
      }
      .speech-bubble.visible {
        opacity: 1;
      }
      .speech-bubble::after {
        content: '';
        position: absolute;
        bottom: -7px;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 7px solid transparent;
        border-right: 7px solid transparent;
        border-top: 7px solid rgba(201, 168, 124, 0.35);
      }
      .speech-bubble::before {
        content: '';
        position: absolute;
        bottom: -6px;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
        border-top: 6px solid #0e0c17;
        z-index: 1;
      }
      @keyframes breathe {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.06);
        }
      }
      @keyframes breathe-fast {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.09);
        }
      }
      @keyframes ring-pulse {
        0%,
        100% {
          opacity: 0.3;
          transform: scale(1);
        }
        50% {
          opacity: 0.6;
          transform: scale(1.05);
        }
      }
    </style>
  </head>
  <body>
    <div class="root">
      <div class="speech-bubble" id="speech-bubble"></div>
      <button class="btn" id="btn">
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
          <polygon points="60,22 91,39.5 91,74.5 60,92 29,74.5 29,39.5"
            fill="rgba(201,168,124,0.07)">
            <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"
              calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
          </polygon>
          <polygon points="60,14 97,35 97,79 60,100 23,79 23,35"
            fill="none" stroke="#c9a87c" stroke-width="2.5"
            stroke-linejoin="round">
            <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"
              calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
          </polygon>
          <circle cx="97" cy="35" r="3" fill="#c9a87c">
            <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"
              calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
          </circle>
          <text x="60" y="65" text-anchor="middle"
            font-family="'Space Mono','Courier New',monospace" font-weight="700" font-size="20"
            fill="#c9a87c" letter-spacing="1">
            B&gt;
          </text>
          <rect x="74" y="51" width="2" height="14" fill="#c9a87c">
            <animate attributeName="opacity" values="1;1;0;0;1;1" dur="1.4s" repeatCount="indefinite"
              keyTimes="0;0.4;0.5;0.9;1;1"/>
          </rect>
        </svg>
        <span class="ring ring-1"></span>
        <span class="ring ring-2"></span>
        <span class="speaking-dot" id="speaking-dot">&#9689;</span>
      </button>
    </div>
    <script>
      const btn = document.getElementById('btn');
      let dragStart = null;
      let isDragging = false;

      btn.addEventListener('mousedown', e => {
        dragStart = { x: e.screenX, y: e.screenY };
        isDragging = false;
        e.preventDefault();
      });

      window.addEventListener('mousemove', e => {
        if (!dragStart) return;
        const dx = e.screenX - dragStart.x;
        const dy = e.screenY - dragStart.y;
        if (!isDragging && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
          isDragging = true;
          btn.classList.add('dragging');
        }
        if (isDragging) {
          window.bubbleAPI?.moveDelta(dx, dy);
          dragStart.x = e.screenX;
          dragStart.y = e.screenY;
        }
      });

      window.addEventListener('mouseup', () => {
        if (dragStart && !isDragging) {
          window.bubbleAPI?.toggle();
        }
        dragStart = null;
        isDragging = false;
        btn.classList.remove('dragging');
      });

      const MAX_WORDS = 120; // ~120 words; bubble grows up to max-height: 400px

      const speakingDot = document.getElementById('speaking-dot');
      const speechBubble = document.getElementById('speech-bubble');
      let companionOpen = false;
      let isSpeaking = false;
      let speakingText = '';
      // Minimum time (ms) the bubble stays visible once shown
      const BUBBLE_MIN_MS = 1500;
      // Delay (ms) before hiding the bubble after speaking stops
      const BUBBLE_HIDE_DELAY_MS = 300;
      let bubbleShownAt = 0;
      let hideTimer = null;

      function showBubble(text) {
        if (!text) return;
        if (hideTimer !== null) {
          clearTimeout(hideTimer);
          hideTimer = null;
        }
        speakingDot.classList.add('visible');
        // Only trigger the CSS opacity animation on hidden→visible transition
        const wasVisible = speechBubble.classList.contains('visible');
        if (!wasVisible) {
          speechBubble.classList.add('visible');
          bubbleShownAt = Date.now();
        }
        // Sliding window: show only the last MAX_WORDS words
        const allWords = text.trim().split(/\s+/);
        const visibleWords = allWords.slice(-MAX_WORDS);
        const displayText = visibleWords.join(' ');
        speechBubble.textContent = displayText;
      }

      function hideBubble() {
        speakingDot.classList.remove('visible');
        speechBubble.classList.remove('visible');
        hideTimer = null;
      }

      function scheduleHide() {
        if (hideTimer !== null) clearTimeout(hideTimer);
        const elapsed = Date.now() - bubbleShownAt;
        // Honour both the minimum display time and the hide delay
        const delay = Math.max(BUBBLE_HIDE_DELAY_MS, BUBBLE_MIN_MS - elapsed);
        hideTimer = setTimeout(() => {
          // Only hide if speaking is still false when the timer fires
          if (!isSpeaking) hideBubble();
        }, delay);
      }

      function updateSpeakingUI(text) {
        const showIndicators = isSpeaking && !companionOpen;
        if (showIndicators) {
          showBubble(text);
          speakingDot.classList.add('visible');
        } else if (!isSpeaking) {
          if (bubbleShownAt === 0) {
            hideBubble();
          } else {
            scheduleHide();
          }
        } else {
          // isSpeaking but companionOpen — hide immediately
          hideBubble();
        }
      }

      window.bubbleAPI?.onStateChange(state => {
        const isOpen = state === 'open';
        btn.classList.toggle('open', isOpen);
        companionOpen = isOpen;
        updateSpeakingUI(speakingText);
      });

      window.bubbleAPI?.onSpeaking((speaking, text) => {
        isSpeaking = speaking;
        speakingText = text || '';
        updateSpeakingUI(speakingText);
      });
    </script>
  </body>
</html>
