name: Daily DB Backup

# SUPABASE_DB_URL must be set in GitHub repository secrets.
# To find it: Supabase Dashboard → Settings → Database →
# Connection string → URI mode → copy the URI (starts with postgres://).
# Add it at: https://github.com/<owner>/<repo>/settings/secrets/actions

on:
  schedule:
    # Runs daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    name: Supabase DB Backup
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Dump public tables
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          FILENAME="backup-$(date +%Y-%m-%d).sql.gz"
          pg_dump "$DATABASE_URL" \
            --clean \
            --no-owner \
            --no-acl \
            --schema=public \
            -t public.projects \
            -t public.user_settings \
            -t public.feature_requests \
            -t public.feature_votes \
            -t public.feature_email_log \
            | gzip > "$FILENAME"
          echo "BACKUP_FILE=$FILENAME" >> "$GITHUB_ENV"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ env.BACKUP_FILE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30
