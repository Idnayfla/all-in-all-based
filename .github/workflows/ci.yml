name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: quality

    env:
      # Dummy values — build must not fail on missing env vars
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      SUPABASE_SERVICE_KEY: placeholder
      ANTHROPIC_API_KEY: placeholder
      E2B_API_KEY: placeholder
      REDIS_URL: redis://placeholder:placeholder@placeholder:6379
      GROQ_API_KEY: placeholder
      FAL_KEY: placeholder
      STRIPE_SECRET_KEY: placeholder
      STRIPE_WEBHOOK_SECRET: placeholder
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: placeholder
      NEXT_PUBLIC_SENTRY_DSN: https://placeholder@placeholder.ingest.sentry.io/0
      SENTRY_ORG: placeholder
      SENTRY_PROJECT: placeholder
      RESEND_API_KEY: placeholder
      TAVILY_API_KEY: placeholder
      OPENWEATHER_API_KEY: placeholder
      ALWAYS_PRO: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
